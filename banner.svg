<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes twinkle1 { 0%,100%{opacity:.9} 50%{opacity:.2} }
    @keyframes twinkle2 { 0%,100%{opacity:.5} 50%{opacity:1} }
    @keyframes twinkle3 { 0%,100%{opacity:.7} 33%{opacity:.1} 66%{opacity:.9} }
    @keyframes shoot {
      0%   { transform:translate(0,0);   opacity:0 }
      5%   { opacity:1 }
      100% { transform:translate(-540px,270px); opacity:0 }
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes glow   { 0%,100%{opacity:.35} 50%{opacity:.75} }
    .s1{animation:twinkle1 2.1s ease-in-out infinite}
    .s2{animation:twinkle2 3.4s ease-in-out infinite}
    .s3{animation:twinkle3 1.8s ease-in-out infinite}
    .s4{animation:twinkle1 4.2s ease-in-out infinite}
    .s5{animation:twinkle2 2.7s ease-in-out infinite}
    .m1{animation:shoot 4s linear infinite;animation-delay:0s}
    .m2{animation:shoot 4s linear infinite;animation-delay:1.3s}
    .m3{animation:shoot 4s linear infinite;animation-delay:2.6s}
    .m4{animation:shoot 4s linear infinite;animation-delay:0.8s}
    .m5{animation:shoot 4s linear infinite;animation-delay:3.1s}
    .title{animation:fadeUp .9s ease .1s both}
    .sub{animation:fadeUp .9s ease .5s both}
    .note{animation:fadeUp .9s ease .8s both}
    .tags{animation:fadeUp .9s ease 1.1s both}
    .cursor{animation:blink 1s step-end infinite}
    .orb{animation:glow 4s ease-in-out infinite}
  </style>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#000005"/>
    <stop offset="55%"  stop-color="#040d2e"/>
    <stop offset="100%" stop-color="#0a2a6e"/>
  </linearGradient>
  <linearGradient id="horizglow" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#1a4fbb" stop-opacity="0"/>
    <stop offset="100%" stop-color="#1a4fbb" stop-opacity="0.4"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#42f5cb"/>
    <stop offset="100%" stop-color="#4f6bed"/>
  </linearGradient>
  <linearGradient id="tail" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0.85"/>
  </linearGradient>
  <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#3a6fff" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#3a6fff" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#42f5cb" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#42f5cb" stop-opacity="0"/>
  </radialGradient>
</defs>

